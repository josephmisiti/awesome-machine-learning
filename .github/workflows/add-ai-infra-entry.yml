name: Add AI Infrastructure Index entry
on:
  push:
    paths:
      - '.github/workflows/add-ai-infra-entry.yml'
jobs:
  add-entry:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-ai-infra-index-v2
      - name: Add entry to README
        run: |
          if grep -q 'AI Infrastructure Index' README.md; then
            echo 'Entry already exists'
            exit 0
          fi
          sed -i '/<a name="books"><\/a>/i\* [AI Infrastructure Index](https://github.com/alpha-one-index/ai-infra-index) - Open-source AI hardware specifications, cloud GPU pricing (12 providers, hourly auto-updates), training cost analysis, model-GPU sizing guides, and inference benchmarks. Machine-readable JSON data and comprehensive Markdown documentation.' README.md
          if grep -q 'AI Infrastructure Index' README.md; then
            echo 'Entry added successfully'
          else
            echo 'Failed to add entry'
            exit 1
          fi
      - name: Remove this workflow file
        run: rm -f .github/workflows/add-ai-infra-entry.yml
      - name: Commit changes
        run: |
          git config user.name 'alpha-one-index'
          git config user.email 'alpha.one.hq@proton.me'
          git add -A
          git commit -m 'Add AI Infrastructure Index to Tools > Misc section'
          git push
