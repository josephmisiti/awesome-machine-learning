name: Add AI Infrastructure Index Entry

on:
  push:
    branches:
      - add-ai-infra-index

permissions:
  contents: write

jobs:
  add-entry:
    runs-on: ubuntu-latest
    # Only run if this isn't already the workflow's own commit
    if: "!contains(github.event.head_commit.message, 'Add AI Infrastructure Index to Tools')"
    steps:
      - name: Checkout master (source)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Create/reset branch and add AI Infrastructure Index entry
        run: |
          git config user.name "Alpha One Index"
          git config user.email "alpha.one.hq@proton.me"
          
          # Create/reset the add-ai-infra-index branch from master
          git checkout -B add-ai-infra-index
          
          # Add the AI Infrastructure Index entry to README.md
          python3 << 'PYEOF'
          with open('README.md', 'r') as f:
              content = f.read()
          
          new_entry = '* [AI Infrastructure Index](https://github.com/alpha-one-index/ai-infra-index) - Open-source AI hardware specifications, cloud GPU pricing (12 providers, hourly auto-updates), training cost analysis, model-GPU sizing guides, and inference benchmarks. Machine-readable JSON data and comprehensive Markdown documentation.\n'
          
          marker = '<a name="books"></a>'
          if marker in content and 'AI Infrastructure Index' not in content:
              content = content.replace(marker, new_entry + marker)
              with open('README.md', 'w') as f:
                  f.write(content)
              print('SUCCESS: Added AI Infrastructure Index entry')
              print(f'File size: {len(content)} chars')
          elif 'AI Infrastructure Index' in content:
              print('Entry already exists - no change needed')
          else:
              print('ERROR: Could not find marker')
              import sys; sys.exit(1)
          PYEOF

      - name: Commit and force-push to branch
        run: |
          git add README.md
          git status
          git diff --staged --stat
          git commit -m "Add AI Infrastructure Index to Tools > Misc section

Adds the AI Infrastructure Index — comprehensive open-source AI hardware specs, cloud GPU pricing from 12 providers with hourly auto-updates, training cost analysis, model-GPU sizing guides, and inference benchmarks."
          git push --force origin add-ai-infra-index
          echo "Branch updated successfully!"
          git log --oneline -3
